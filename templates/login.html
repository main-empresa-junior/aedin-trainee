<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Aedin</title>
    <link rel="stylesheet" href="{{ get_url(path='main.css') }}">
</head>
<body class="login-area">
    <div class="login-container">
        <header>
            <h1>Seja bem vindo a Aedin</h1>
            <img src="{{ get_url(path='images/logo-aedin.svg') }}" alt="Logo AEDIN" class="logo">
        </header>

        <main>
            <form action="Login.html" method="post">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>

                <label for="password">Senha:</label>
                <input type="password" id="password" name="password" required>

                <button type="button" onclick="window.location.href='/'">
                Entrar
                </button>
            </form>

            <div class="esqueceu-a-senha">
                <p>Não tem uma conta? <a href="Cadastro.html">Cadastre-se aqui</a></p>
            </div>
        </main>
    </div>
</body>
</html>
