<header class="main-header">
    <div class="container">
        <div class="logo">
            <a href="{{ get_url(path='') }}">
                <img
                    src="{{ get_url(path='images/logo-aedin.svg') }}"
                    alt="AEDIN Logo"
                />
            </a>
        </div>
        <nav class="nav-menu">
            <ul>
                <li>
                    <a
                        href="{{ get_url(path='') }}"
                        class="{% if current_path is defined and current_path == '/' %}active{% endif %}"
                        >Home</a
                    >
                </li>
                <li>
                    <a
                        href="{{ get_url(path='sobre') }}"
                        class="{% if current_path is defined and current_path is starting_with('/sobre') %}active{% endif %}"
                        >Sobre</a
                    >
                </li>
                <li>
                    <a
                        href="{{ get_url(path='directors') }}"
                        class="{% if current_path is defined and current_path is starting_with('/directors') %}active{% endif %}"
                        >Diretoria</a
                    >
                </li>
                <li>
                    <a
                        href="{{ get_url(path='eventos-projetos') }}"
                        class="{% if current_path is defined and current_path is starting_with('/eventos-projetos') %}active{% endif %}"
                        >Eventos e Projetos</a
                    >
                </li>
                <li>
                    <a
                        href="{{ get_url(path='associados') }}"
                        class="{% if current_path is defined and current_path is starting_with('/associados') %}active{% endif %}"
                        >Associados</a
                    >
                </li>
                <li>
                    <a
                        href="{{ get_url(path='login')}}"
                        class="{% if current_path is defined and current_path is starting_with('/login') %}active{% endif %}"
                        >Login</a
                    >
                </li>
            </ul>
        </nav>
    </div>
</header>
